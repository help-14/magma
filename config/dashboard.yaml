version: 1
dashboard:
  widgets:
    - id: timer-main
      type: timer
      title: Timer
      x: -5
      y: 1
      w: 7
      h: 2
      config: {}
    - id: weather-main
      type: weather
      title: Weather
      x: 2
      y: 1
      w: 3
      h: 2
      config:
        locationRef: default
    - id: search-main
      type: search
      title: Search
      x: -5
      y: 3
      w: 10
      h: 1
      config:
        provider: google
        placeholder: type something to search...
    - id: apps-stack
      type: stack-horizontal
      title: Applications
      x: -5
      y: 4
      w: 10
      h: 2
      config:
        gap: 12
      children:
        - id: unifi
          type: button
          title: UniFi
          config:
            icon: simple-icons:ubiquiti
            url: https://10.0.0.1/
        - id: truenas
          type: button
          title: Truenas
          config:
            icon: simple-icons:truenas
            url: http://truenas.local
        - id: dockhand
          type: button
          title: Dockhand
          config:
            icon: simple-icons:docker
            url: https://dockhand.nhan.pt
        - id: button-mqs1vt7u-fs1k
          type: button
          title: Button
          config:
            icon: material-symbols:house
            url: https://
            iconColor: ''
    - id: media-stack
      type: stack-horizontal
      title: Media
      x: -5
      y: 6
      w: 10
      h: 2
      config:
        gap: 12
      children:
        - id: photos
          type: button
          title: Photos
          config:
            icon: image
            url: https://photos.nhan.pt
        - id: jellyfin
          type: button
          title: Jellyfin
          config:
            icon: simple-icons:jellyfin
            url: https://phim.nhan.pt
        - id: radarr
          type: button
          title: Radarr
          config:
            icon: simple-icons:radarr
            url: https://radarr.nhan.pt
        - id: sonarr
          type: button
          title: Sonarr
          config:
            icon: simple-icons:sonarr
            url: https://sonarr.nhan.pt
    - id: docker-status-mqrjvli3-7g80
      type: docker-status
      title: Docker
      x: -5
      y: 8
      w: 6
      h: 4
      config:
        dockerHost: http://10.10.10.90:2375
        columns: 2
    - id: calendar-mqs8wzat-ass1
      type: calendar
      title: Calendar
      x: 1
      y: 8
      w: 4
      h: 4
      config: {}
locations:
  default:
    latitude: 21.042698
    longitude: 105.808534
search:
  enabled: true
  provider: google
network:
  localPingUrl: 10.0.0.1
  localPingTimeout: 300
theme:
  accentColor: '#fabd2f'
integrations:
  weather:
    provider: openweather
    apiKeyEnv: WEATHER_API
  honeygain:
    authEnv: HONEYGAIN_AUTH
  youtube:
    enabled: true
  docker:
    enabled: false
